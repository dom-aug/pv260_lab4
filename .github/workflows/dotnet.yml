# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

permissions: 
  pages: write
  id-token: write
  contents: read

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Publish
      run: dotnet publish Demo.BlazorWasmApp/Demo.BlazorWasmApp.csproj -c Release -o artifact

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v4.0.0
      with:
        # Artifact name
        name: github-pages  # optional, default is github-pages
        # Path of the directory containing the static assets.
        path: artifacts/wwwroot # default is _site/
        # Duration after which artifact will expire in days.
        retention-days: # optional, default is 1
          
